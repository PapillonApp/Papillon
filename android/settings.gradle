rootProject.name = 'Papillon'

def resolveNodeModulePath(String packageName, String relativePath) {
    def cmd = ["node", "-p", "require.resolve('${packageName}')"]
    def proc = cmd.execute(null, rootDir)
    proc.waitFor()
    if (proc.exitValue() != 0) {
        throw new GradleException("Failed to resolve module path for ${packageName}: ${proc.err.text}")
    }
    return new File(proc.in.text.trim(), relativePath)
}

dependencyResolutionManagement {
    versionCatalogs {
        reactAndroidLibs {
            from(files(resolveNodeModulePath('react-native/package.json', '../gradle/libs.versions.toml')))
        }
    }
}

// Apply Expo autolinking script
apply from: resolveNodeModulePath('expo/package.json', '../scripts/autolinking.gradle')
useExpoModules()

// Apply React Native CLI platform-android autolinking
apply from: resolveNodeModulePath('@react-native-community/cli-platform-android/package.json', '../native_modules.gradle')
applyNativeModulesSettingsGradle(settings)

include ':app'

// Include React Native Gradle plugin
includeBuild(resolveNodeModulePath('@react-native/gradle-plugin/package.json', '').parent)
